<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SalesScreen Finance Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f5f3;
      --surface: #ffffff;
      --border: rgba(0,0,0,0.08);
      --text-primary: #1a1a1a;
      --text-secondary: #6b6b6b;
      --text-muted: #9b9b9b;
      --green-bg: #eaf3de; --green-text: #3b6d11; --green-dot: #639922;
      --red-bg: #fcebeb; --red-text: #a32d2d; --red-dot: #e24b4a;
      --amber-bg: #faeeda; --amber-text: #854f0b; --amber-dot: #ef9f27;
      --blue: #185fa5;
      --radius: 12px; --radius-sm: 8px;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text-primary); min-height: 100vh; }
    header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 2rem; height: 56px; display: flex; align-items: center; justify-content: space-between; }
    .logo { display: flex; align-items: center; gap: 10px; font-size: 15px; font-weight: 500; }
    .logo-icon { width: 28px; height: 28px; background: var(--blue); border-radius: 6px; display: flex; align-items: center; justify-content: center; }
    .logo-icon svg { width: 16px; height: 16px; }
    .header-right { font-size: 12px; color: var(--text-muted); }
    main { max-width: 860px; margin: 0 auto; padding: 2.5rem 2rem; }
    .page-title { font-size: 22px; font-weight: 500; margin-bottom: 4px; }
    .page-sub { font-size: 14px; color: var(--text-secondary); margin-bottom: 2rem; }
    .section-label { font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); margin-bottom: .75rem; display: block; }
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; margin-bottom: 2rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem 1.5rem; }
    .card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 1rem; }
    .card-entity { font-size: 12px; color: var(--text-muted); margin-bottom: 3px; }
    .card-name { font-size: 15px; font-weight: 500; }
    .badge { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 500; padding: 3px 9px; border-radius: 99px; white-space: nowrap; }
    .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .badge-ok { background: var(--green-bg); color: var(--green-text); }
    .badge-ok .dot { background: var(--green-dot); }
    .badge-warn { background: var(--amber-bg); color: var(--amber-text); }
    .badge-warn .dot { background: var(--amber-dot); }
    .badge-err { background: var(--red-bg); color: var(--red-text); }
    .badge-err .dot { background: var(--red-dot); }
    .badge-neutral { background: var(--bg); color: var(--text-muted); }
    .badge-neutral .dot { background: var(--text-muted); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    .badge-loading .dot { background: var(--amber-dot); animation: pulse 1.2s ease-in-out infinite; }
    .badge-loading { background: var(--amber-bg); color: var(--amber-text); }
    .check-table { width: 100%; border-collapse: collapse; }
    .check-table th { font-size: 12px; font-weight: 500; color: var(--text-muted); text-align: left; padding: 6px 10px; border-bottom: 1px solid var(--border); }
    .check-table th:last-child { text-align: right; }
    .check-table td { font-size: 13px; padding: 8px 10px; border-bottom: 1px solid var(--border); vertical-align: middle; color: var(--text-primary); }
    .check-table tr:last-child td { border-bottom: none; }
    .check-table td:last-child { text-align: right; }
    .section-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 1rem; overflow: hidden; }
    .section-head { padding: .875rem 1.25rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .section-head-title { font-size: 13px; font-weight: 500; }
    .section-body { padding: 0; }
    .empty { text-align: center; padding: 2.5rem; color: var(--text-muted); font-size: 14px; }
    .meta-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
    .last-updated { font-size: 12px; color: var(--text-muted); }
    .delta-up { color: var(--red-text); font-weight: 500; }
    .delta-down { color: var(--green-text); font-weight: 500; }
    .delta-n { color: var(--text-muted); }
    .worth-look { background: var(--amber-bg); border-radius: var(--radius-sm); padding: 12px 16px; margin-bottom: 1.5rem; }
    .wl-title { font-size: 13px; font-weight: 500; color: var(--amber-text); margin-bottom: 6px; }
    .wl-item { font-size: 13px; color: var(--amber-text); padding: 2px 0; }
    .wl-item::before { content: "→ "; }
    .all-clear { background: var(--green-bg); border-radius: var(--radius-sm); padding: 10px 16px; margin-bottom: 1.5rem; font-size: 13px; color: var(--green-text); display: flex; align-items: center; gap: 8px; }
  </style>
</head>
<body>
<header>
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 16 16" fill="none"><rect x="2" y="8" width="3" height="6" rx="1" fill="white"/><rect x="6.5" y="5" width="3" height="9" rx="1" fill="white"/><rect x="11" y="2" width="3" height="12" rx="1" fill="white"/></svg>
    </div>
    SalesScreen Finance
  </div>
  <div class="header-right">Internal · Finance team</div>
</header>

<main>
  <div class="page-title">Monthly close dashboard</div>
  <div class="page-sub">Dogu SalesScreen AS · Data pushed from Claude</div>

  <div id="app"><div class="empty">Loading…</div></div>
</main>

<script>
const SECRET = 'finance2026';

// Auth is handled server-side via cookie — data.js returns 401 if not logged in

function fmt(n) {
  if (n == null || isNaN(n)) return '—';
  return new Intl.NumberFormat('nb-NO', { maximumFractionDigits: 0 }).format(n);
}
function fmtD(n) {
  if (n == null || isNaN(n)) return '—';
  return (n >= 0 ? '+' : '') + fmt(n);
}
function badge(type, text) {
  return `<span class="badge badge-${type}"><span class="dot"></span>${text}</span>`;
}

async function load() {
  try {
    const res = await fetch('/api/data', { credentials: 'include' });
    if (res.status === 401) {
      window.location.href = '/login.html';
      return;
    }
    const json = await res.json();
    if (!json.ok || !json.data) {
      document.getElementById('app').innerHTML = `<div class="empty">No data yet. Run "update dashboard" in Claude to push the first snapshot.</div>`;
      return;
    }
    render(json.data);
  } catch(e) {
    document.getElementById('app').innerHTML = `<div class="empty">Could not load data: ${e.message}</div>`;
  }
}

function render(d) {
  const updated = d.updatedAt ? new Date(d.updatedAt).toLocaleString('en-GB', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' }) : '—';

  // Status checks
  const checks = d.status?.checks || [];
  const warnings = checks.filter(c => !c.info && !c.ok);
  const passed = checks.filter(c => !c.info && c.ok).length;
  const total = checks.filter(c => !c.info).length;

  const checkRows = checks.map(c => {
    const b = c.info ? badge('neutral', c.count != null ? `${c.count} items` : 'Info')
      : c.ok ? badge('ok', 'OK') : badge('warn', 'Check');
    const val = c.amount != null ? `NOK ${fmt(Math.abs(c.amount))}` : c.count != null ? `${c.count}` : '—';
    return `<tr>
      <td>${c.label}</td>
      <td style="color:var(--text-secondary);font-size:12px">${c.note || ''}</td>
      <td style="text-align:right">${val}</td>
      <td>${b}</td>
    </tr>`;
  }).join('');

  const worthLook = warnings.length
    ? `<div class="worth-look"><div class="wl-title">Worth a look</div>${warnings.map(w=>`<div class="wl-item">${w.label}: ${w.note||''}</div>`).join('')}</div>`
    : `<div class="all-clear">✓ All checks clear for ${d.status?.period || ''}.</div>`;

  // Summary cards
  const summaryCards = `
  <div class="cards">
    <div class="card">
      <div class="card-entity">Period</div>
      <div class="card-name">${d.status?.period || '—'}</div>
    </div>
    <div class="card">
      <div class="card-entity">Checks passed</div>
      <div class="card-name">${passed} / ${total}</div>
    </div>
    <div class="card">
      <div class="card-entity">Attestation queue</div>
      <div class="card-name">${d.status?.attestationCount ?? '—'}</div>
    </div>
    <div class="card">
      <div class="card-entity">Voucher inbox</div>
      <div class="card-name">${d.status?.voucherCount ?? '—'}</div>
    </div>
    <div class="card">
      <div class="card-entity">GL 5000 salary</div>
      <div class="card-name" style="font-size:14px">NOK ${fmt(d.salary?.gl5000current)}</div>
    </div>
    <div class="card">
      <div class="card-entity">Cost flags (>50k)</div>
      <div class="card-name" style="color:var(--${(d.costs?.flagged||0)>0?'amber':'green'}-text)">${d.costs?.flagged ?? '—'}</div>
    </div>
  </div>`;

  // Cost variances
  const costRows = (d.costs?.top || []).map(a => {
    const delta = (a.current||0) - (a.prior||0);
    const pct = a.prior ? ((delta/a.prior)*100).toFixed(1)+'%' : '—';
    const cls = Math.abs(delta)>=50000 ? (delta>0?'delta-up':'delta-down') : 'delta-n';
    const flag = Math.abs(delta)>=50000 ? badge('warn','Flag') : '';
    return `<tr>
      <td style="font-size:12px;color:var(--text-muted)">${a.gl}</td>
      <td>${a.name}</td>
      <td style="text-align:right">${fmt(a.prior)}</td>
      <td style="text-align:right">${fmt(a.current)}</td>
      <td class="${cls}" style="text-align:right">${fmtD(delta)}</td>
      <td style="text-align:right">${flag}</td>
    </tr>`;
  }).join('');

  // Salary
  const salRows = (d.salary?.accounts || []).map(a => {
    const delta = (a.current||0) - (a.prior||0);
    const pct = a.prior ? ((delta/a.prior)*100).toFixed(1) : null;
    const flag = a.gl === '5000' && Math.abs(delta) > 5000;
    const cls = delta > 0 ? 'delta-up' : delta < 0 ? 'delta-down' : 'delta-n';
    return `<tr ${flag?'style="background:var(--amber-bg)"':''}>
      <td style="font-size:12px;color:var(--text-muted)">${a.gl}</td>
      <td>${a.name}</td>
      <td style="text-align:right">${fmt(a.prior)}</td>
      <td style="text-align:right">${fmt(a.current)}</td>
      <td class="${cls}" style="text-align:right">${fmtD(delta)}</td>
      <td style="text-align:right">${pct!=null?(delta>=0?'+':'')+pct+'%':'—'}</td>
    </tr>`;
  }).join('');

  // Suppliers
  const newRows = (d.suppliers?.new || []).map(s => {
    const amt = Math.abs(s.amount||0);
    const b = amt>=50000 ? badge('err','Flag >50k') : amt>=10000 ? badge('warn','Flag >10k') : badge('neutral','OK');
    return `<tr ${amt>=50000?'style="background:var(--red-bg)"':amt>=10000?'style="background:var(--amber-bg)"':''}>
      <td>${s.name}</td><td style="text-align:right">${fmt(amt)}</td>
      <td style="font-size:12px;color:var(--text-muted);text-align:center">${s.gls||''}</td>
      <td>${b}</td>
    </tr>`;
  }).join('') || `<tr><td colspan="4" style="text-align:center;color:var(--text-muted);padding:12px">No new suppliers</td></tr>`;

  const misRows = (d.suppliers?.missing || []).map(s => {
    const amt = Math.abs(s.amount||0);
    const b = amt>=10000 ? badge('warn','Verify') : badge('neutral','OK');
    return `<tr ${amt>=10000?'style="background:var(--amber-bg)"':''}>
      <td>${s.name}</td><td style="text-align:right">${fmt(amt)}</td>
      <td style="font-size:12px;color:var(--text-muted);text-align:center">${s.gls||''}</td>
      <td>${b}</td>
    </tr>`;
  }).join('') || `<tr><td colspan="4" style="text-align:center;color:var(--text-muted);padding:12px">No missing suppliers</td></tr>`;

  document.getElementById('app').innerHTML = `
    <div class="meta-row">
      <span class="last-updated">Last updated: ${updated}</span>
    </div>

    ${summaryCards}
    ${worthLook}

    <span class="section-label">Close readiness checks</span>
    <div class="section-wrap">
      <div class="section-body">
        <table class="check-table">
          <thead><tr><th>Check</th><th>Note</th><th style="text-align:right">Value</th><th style="text-align:right">Status</th></tr></thead>
          <tbody>${checkRows}</tbody>
        </table>
      </div>
    </div>

    <span class="section-label" style="margin-top:1.5rem;display:block">Cost variances — ${d.costs?.label||''} vs ${d.costs?.priorLabel||''}</span>
    <div class="section-wrap">
      <div class="section-body">
        <table class="check-table">
          <thead><tr><th>GL</th><th>Account</th><th style="text-align:right">Prior</th><th style="text-align:right">Current</th><th style="text-align:right">Delta</th><th style="text-align:right"></th></tr></thead>
          <tbody>${costRows || '<tr><td colspan="6" style="text-align:center;color:var(--text-muted);padding:12px">No data</td></tr>'}</tbody>
        </table>
      </div>
    </div>

    <span class="section-label" style="margin-top:1.5rem;display:block">Salary — ${d.salary?.label||''} vs ${d.salary?.priorLabel||''}</span>
    <div class="section-wrap">
      <div class="section-body">
        <table class="check-table">
          <thead><tr><th>GL</th><th>Account</th><th style="text-align:right">Prior</th><th style="text-align:right">Current</th><th style="text-align:right">Delta</th><th style="text-align:right">%</th></tr></thead>
          <tbody>${salRows || '<tr><td colspan="6" style="text-align:center;color:var(--text-muted);padding:12px">No data</td></tr>'}</tbody>
        </table>
      </div>
    </div>

    <span class="section-label" style="margin-top:1.5rem;display:block">New suppliers — ${d.suppliers?.label||''}</span>
    <div class="section-wrap">
      <div class="section-body">
        <table class="check-table">
          <thead><tr><th>Supplier</th><th style="text-align:right">Amount (NOK)</th><th style="text-align:center">GL(s)</th><th style="text-align:right">Flag</th></tr></thead>
          <tbody>${newRows}</tbody>
        </table>
      </div>
    </div>

    <span class="section-label" style="margin-top:1.5rem;display:block">Missing suppliers — vs ${d.suppliers?.priorLabel||''}</span>
    <div class="section-wrap">
      <div class="section-body">
        <table class="check-table">
          <thead><tr><th>Supplier</th><th style="text-align:right">Prior amount (NOK)</th><th style="text-align:center">GL(s)</th><th style="text-align:right">Flag</th></tr></thead>
          <tbody>${misRows}</tbody>
        </table>
      </div>
    </div>`;
}

load();
</script>
</body>
</html>
