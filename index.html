<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SalesScreen Finance Dashboard</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#f5f5f3;--surface:#fff;--border:rgba(0,0,0,0.08);
      --text-primary:#1a1a1a;--text-secondary:#6b6b6b;--text-muted:#9b9b9b;
      --green-bg:#eaf3de;--green-text:#3b6d11;--green-dot:#639922;
      --red-bg:#fcebeb;--red-text:#a32d2d;--red-dot:#e24b4a;
      --amber-bg:#faeeda;--amber-text:#854f0b;--amber-dot:#ef9f27;
      --blue:#185fa5;--radius:12px;--radius-sm:8px;
    }
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text-primary);min-height:100vh}
    header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 2rem;height:56px;display:flex;align-items:center;justify-content:space-between}
    .logo{display:flex;align-items:center;gap:10px;font-size:15px;font-weight:500}
    .logo-icon{width:28px;height:28px;background:var(--blue);border-radius:6px;display:flex;align-items:center;justify-content:center}
    .logo-icon svg{width:16px;height:16px}
    .header-right{font-size:12px;color:var(--text-muted)}
    main{max-width:860px;margin:0 auto;padding:2.5rem 2rem}
    .page-title{font-size:22px;font-weight:500;margin-bottom:4px}
    .page-sub{font-size:14px;color:var(--text-secondary);margin-bottom:.5rem}
    .last-updated{font-size:12px;color:var(--text-muted);margin-bottom:2rem}
    .entity-section{margin-bottom:2rem}
    .entity-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem}
    .entity-name{font-size:14px;font-weight:500;color:var(--text-primary)}
    .entity-sub{font-size:12px;color:var(--text-muted)}
    .checks{display:flex;flex-direction:column;gap:8px}
    .check-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:.875rem 1.25rem;display:flex;align-items:flex-start;justify-content:space-between;gap:1rem}
    .check-left{display:flex;flex-direction:column;gap:3px;flex:1}
    .check-name{font-size:13px;font-weight:500;color:var(--text-primary)}
    .check-note{font-size:12px;color:var(--text-secondary);line-height:1.4}
    .badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:500;padding:4px 10px;border-radius:99px;white-space:nowrap;flex-shrink:0}
    .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
    .badge-ok{background:var(--green-bg);color:var(--green-text)}.badge-ok .dot{background:var(--green-dot)}
    .badge-warn{background:var(--amber-bg);color:var(--amber-text)}.badge-warn .dot{background:var(--amber-dot)}
    .badge-err{background:var(--red-bg);color:var(--red-text)}.badge-err .dot{background:var(--red-dot)}
    .badge-neutral{background:var(--bg);color:var(--text-muted);border:1px solid var(--border)}.badge-neutral .dot{background:var(--text-muted)}
    .badge-na{background:var(--bg);color:var(--text-muted);border:1px solid var(--border)}
    .divider{border:none;border-top:1px solid var(--border);margin:1.5rem 0}
    .summary-bar{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-bottom:2rem}
    .sc{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:.875rem 1.25rem}
    .sc-label{font-size:11px;color:var(--text-muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.03em}
    .sc-value{font-size:18px;font-weight:500}
    .empty{text-align:center;padding:3rem;color:var(--text-muted);font-size:14px}
  </style>
</head>
<body>
<header>
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 16 16" fill="none"><rect x="2" y="8" width="3" height="6" rx="1" fill="white"/><rect x="6.5" y="5" width="3" height="9" rx="1" fill="white"/><rect x="11" y="2" width="3" height="12" rx="1" fill="white"/></svg>
    </div>
    SalesScreen Finance
  </div>
  <div class="header-right">Internal · Finance team</div>
</header>

<main>
  <div class="page-title">Monthly close</div>
  <div class="page-sub">Group — all entities · Data pushed from Claude</div>
  <div id="app"><div class="empty">Loading…</div></div>
</main>

<script>
async function load() {
  try {
    const res = await fetch('/api/data', { credentials: 'include' });
    if (res.status === 401) { window.location.href = '/login.html'; return; }
    const json = await res.json();
    if (!json.ok || !json.data) {
      document.getElementById('app').innerHTML = '<div class="empty">No data yet. Run "update dashboard" in Claude to push the first snapshot.</div>';
      return;
    }
    render(json.data);
  } catch(e) {
    document.getElementById('app').innerHTML = `<div class="empty">Could not load data: ${e.message}</div>`;
  }
}

function badge(status, label) {
  const map = { ok:'ok', warn:'warn', err:'err', pending:'neutral', na:'na' };
  const cls = map[status] || 'neutral';
  const labels = { ok:'Done', warn:'Check', err:'Flag', pending:'Pending', na:'N/A' };
  return `<span class="badge badge-${cls}"><span class="dot"></span>${label || labels[status] || status}</span>`;
}

function renderEntity(e) {
  if (!e) return '';
  const checks = (e.checks || []).map(c => `
    <div class="check-card">
      <div class="check-left">
        <div class="check-name">${c.label}</div>
        ${c.note ? `<div class="check-note">${c.note}</div>` : ''}
      </div>
      ${badge(c.status)}
    </div>`).join('');

  const allOk = (e.checks||[]).filter(c=>c.status!=='na').every(c=>c.status==='ok');
  const passed = (e.checks||[]).filter(c=>c.status==='ok').length;
  const total = (e.checks||[]).filter(c=>c.status!=='na').length;

  return `
    <div class="entity-section">
      <div class="entity-header">
        <div>
          <div class="entity-name">${e.name}</div>
          <div class="entity-sub">${e.system} · ${e.country}</div>
        </div>
        ${badge(allOk?'ok':(e.checks||[]).some(c=>c.status==='err')?'err':'warn', `${passed}/${total} done`)}
      </div>
      <div class="checks">${checks || '<div class="check-card"><div class="check-left"><div class="check-name" style="color:var(--text-muted)">No checks configured</div></div></div>'}</div>
    </div>`;
}

function render(d) {
  const updated = d.updatedAt ? new Date(d.updatedAt).toLocaleString('en-GB',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}) : '—';

  const allChecks = [...(d.no?.checks||[]), ...(d.se?.checks||[]), ...(d.us?.checks||[])];
  const totalDone = allChecks.filter(c=>c.status==='ok').length;
  const totalActive = allChecks.filter(c=>c.status!=='na').length;
  const hasFlag = allChecks.some(c=>c.status==='err');
  const hasWarn = allChecks.some(c=>c.status==='warn');
  const overallStatus = hasFlag?'err':hasWarn?'warn':totalDone===totalActive?'ok':'neutral';
  const overallColors = {ok:'var(--green-text)',warn:'var(--amber-text)',err:'var(--red-text)',neutral:'var(--text-primary)'};

  document.getElementById('app').innerHTML = `
    <div class="last-updated">Last updated: ${updated} · ${d.period || ''}</div>
    <div class="summary-bar">
      <div class="sc"><div class="sc-label">Period</div><div class="sc-value" style="font-size:15px">${d.period||'—'}</div></div>
      <div class="sc"><div class="sc-label">Overall</div><div class="sc-value" style="font-size:15px;color:${overallColors[overallStatus]}">${totalDone}/${totalActive} done</div></div>
      <div class="sc"><div class="sc-label">Norway</div><div class="sc-value" style="font-size:15px">${(d.no?.checks||[]).filter(c=>c.status==='ok').length}/${(d.no?.checks||[]).filter(c=>c.status!=='na').length}</div></div>
      <div class="sc"><div class="sc-label">Sweden</div><div class="sc-value" style="font-size:15px">${(d.se?.checks||[]).filter(c=>c.status==='ok').length}/${(d.se?.checks||[]).filter(c=>c.status!=='na').length}</div></div>
      <div class="sc"><div class="sc-label">US</div><div class="sc-value" style="font-size:15px;color:var(--text-muted)">${(d.us?.checks||[]).filter(c=>c.status==='ok').length}/${(d.us?.checks||[]).filter(c=>c.status!=='na').length}</div></div>
    </div>
    ${renderEntity(d.no)}
    <hr class="divider"/>
    ${renderEntity(d.se)}
    <hr class="divider"/>
    ${renderEntity(d.us)}`;
}

load();
</script>
</body>
</html>
