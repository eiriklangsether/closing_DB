<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SalesScreen Finance — Sign in</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; background: #f5f5f3; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: #fff; border: 1px solid rgba(0,0,0,0.08); border-radius: 12px; padding: 2rem; width: 100%; max-width: 360px; }
    .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 1.5rem; font-size: 15px; font-weight: 500; }
    .logo-icon { width: 28px; height: 28px; background: #185fa5; border-radius: 6px; display: flex; align-items: center; justify-content: center; }
    .logo-icon svg { width: 16px; height: 16px; }
    label { font-size: 13px; color: #6b6b6b; display: block; margin-bottom: 6px; }
    input { width: 100%; padding: 8px 12px; font-size: 14px; font-family: inherit; border: 1px solid rgba(0,0,0,0.15); border-radius: 8px; outline: none; margin-bottom: 1rem; }
    input:focus { border-color: #185fa5; }
    button { width: 100%; padding: 9px; font-size: 14px; font-family: inherit; background: #185fa5; color: #fff; border: none; border-radius: 8px; cursor: pointer; }
    button:hover { background: #0c447c; }
    .err { font-size: 13px; color: #a32d2d; margin-bottom: 1rem; display: none; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 16 16" fill="none"><rect x="2" y="8" width="3" height="6" rx="1" fill="white"/><rect x="6.5" y="5" width="3" height="9" rx="1" fill="white"/><rect x="11" y="2" width="3" height="12" rx="1" fill="white"/></svg>
    </div>
    SalesScreen Finance
  </div>
  <label for="pwd">Password</label>
  <input type="password" id="pwd" placeholder="Enter password" autofocus />
  <div class="err" id="err">Incorrect password</div>
  <button onclick="login()">Sign in</button>
</div>
<script>
async function login() {
  const pwd = document.getElementById('pwd').value;
  const res = await fetch('/api/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ password: pwd })
  });
  if (res.ok) {
    window.location.href = '/';
  } else {
    document.getElementById('err').style.display = 'block';
  }
}
document.getElementById('pwd').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
</script>
</body>
</html>
