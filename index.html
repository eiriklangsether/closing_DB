<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SalesScreen Finance Dashboard</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#f5f5f3;--surface:#fff;--border:rgba(0,0,0,0.08);
      --text-primary:#1a1a1a;--text-secondary:#6b6b6b;--text-muted:#9b9b9b;
      --green-bg:#eaf3de;--green-text:#3b6d11;--green-dot:#639922;
      --red-bg:#fcebeb;--red-text:#a32d2d;--red-dot:#e24b4a;
      --amber-bg:#faeeda;--amber-text:#854f0b;--amber-dot:#ef9f27;
      --blue:#185fa5;--radius:12px;--radius-sm:8px;
    }
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text-primary);min-height:100vh}
    header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 2rem;height:56px;display:flex;align-items:center;justify-content:space-between}
    .logo{display:flex;align-items:center;gap:10px;font-size:15px;font-weight:500}
    .logo-icon{width:28px;height:28px;background:var(--blue);border-radius:6px;display:flex;align-items:center;justify-content:center}
    .logo-icon svg{width:16px;height:16px}
    .header-right{font-size:12px;color:var(--text-muted)}
    main{max-width:860px;margin:0 auto;padding:2.5rem 2rem}
    .page-title{font-size:22px;font-weight:500;margin-bottom:6px}
    .page-desc{font-size:14px;color:var(--text-secondary);margin-bottom:4px;line-height:1.5}
    .last-updated{font-size:12px;color:var(--text-muted);margin-bottom:2rem}
    .summary-bar{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-bottom:2rem}
    .sc{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:.875rem 1.25rem}
    .sc-label{font-size:11px;color:var(--text-muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.03em}
    .sc-value{font-size:18px;font-weight:500}
    .section-title{font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:.05em;color:var(--text-muted);margin-bottom:.75rem;display:block}
    .entity-section{margin-bottom:1.75rem}
    .entity-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.625rem}
    .entity-name{font-size:14px;font-weight:500}
    .entity-sub{font-size:12px;color:var(--text-muted)}
    .checks{display:flex;flex-direction:column;gap:6px}
    .check-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:.75rem 1.125rem;display:flex;align-items:flex-start;justify-content:space-between;gap:1rem}
    .check-left{display:flex;flex-direction:column;gap:3px;flex:1}
    .check-name{font-size:13px;font-weight:500}
    .check-note{font-size:12px;color:var(--text-secondary);line-height:1.4}
    .badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:500;padding:4px 10px;border-radius:99px;white-space:nowrap;flex-shrink:0;cursor:default}
    .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
    .badge-ok{background:var(--green-bg);color:var(--green-text)}.badge-ok .dot{background:var(--green-dot)}
    .badge-warn{background:var(--amber-bg);color:var(--amber-text)}.badge-warn .dot{background:var(--amber-dot)}
    .badge-err{background:var(--red-bg);color:var(--red-text)}.badge-err .dot{background:var(--red-dot)}
    .badge-neutral{background:var(--bg);color:var(--text-muted);border:1px solid var(--border)}.badge-neutral .dot{background:var(--text-muted)}
    .badge-na{background:var(--bg);color:var(--text-muted);border:1px solid var(--border)}
    .divider{border:none;border-top:1px solid var(--border);margin:1.5rem 0}
    /* Manual checklist */
    .checklist-section{margin-bottom:2rem}
    .checklist-items{display:flex;flex-direction:column;gap:6px}
    .checklist-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:.75rem 1.125rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;cursor:pointer;transition:background .1s}
    .checklist-item:hover{background:#fafaf8}
    .checklist-item.done{border-color:rgba(99,153,34,.25);background:var(--green-bg)}
    .checklist-left{display:flex;flex-direction:column;gap:2px}
    .checklist-name{font-size:13px;font-weight:500}
    .checklist-name.done-text{color:var(--green-text)}
    .checklist-sub{font-size:12px;color:var(--text-muted)}
    .toggle-btn{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:500;padding:4px 12px;border-radius:99px;border:none;cursor:pointer;font-family:inherit;transition:all .15s}
    .toggle-btn.mark-done{background:var(--bg);color:var(--text-secondary);border:1px solid var(--border)}
    .toggle-btn.mark-done:hover{background:var(--green-bg);color:var(--green-text);border-color:rgba(99,153,34,.3)}
    .toggle-btn.mark-undone{background:var(--green-bg);color:var(--green-text);border:1px solid rgba(99,153,34,.25)}
    .toggle-btn.mark-undone:hover{background:#d9edca}
    .empty{text-align:center;padding:3rem;color:var(--text-muted);font-size:14px}
    .saving-indicator{font-size:11px;color:var(--text-muted);margin-left:8px;display:none}
  </style>
</head>
<body>
<header>
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 16 16" fill="none"><rect x="2" y="8" width="3" height="6" rx="1" fill="white"/><rect x="6.5" y="5" width="3" height="9" rx="1" fill="white"/><rect x="11" y="2" width="3" height="12" rx="1" fill="white"/></svg>
    </div>
    SalesScreen Finance
  </div>
  <div class="header-right">Internal · Finance team</div>
</header>

<main>
  <div class="page-title">Monthly close tracker</div>
  <div class="page-desc">Track how complete the monthly closing process is across all entities. Accounting checks are updated by Claude — manual steps are marked by the finance team.</div>
  <div class="last-updated" id="lastUpdated">Loading…</div>
  <div id="app"><div class="empty">Loading…</div></div>
</main>

<script>
const SECRET = 'finance2026';

async function load() {
  try {
    const res = await fetch('/api/data', { credentials: 'include' });
    if (res.status === 401) { window.location.href = '/login.html'; return; }
    const json = await res.json();
    if (!json.ok || !json.data) {
      document.getElementById('app').innerHTML = '<div class="empty">No data yet. Run "update dashboard" in Claude to push the first snapshot.</div>';
      document.getElementById('lastUpdated').textContent = '';
      return;
    }
    render(json.data);
  } catch(e) {
    document.getElementById('app').innerHTML = `<div class="empty">Could not load data: ${e.message}</div>`;
  }
}

function norwayTime(isoStr) {
  if (!isoStr) return '—';
  return new Date(isoStr).toLocaleString('nb-NO', {
    timeZone: 'Europe/Oslo',
    day: '2-digit', month: 'short', year: 'numeric',
    hour: '2-digit', minute: '2-digit'
  });
}

function badge(status) {
  const map = {
    ok: ['badge-ok','Done'],
    warn: ['badge-warn','Check'],
    err: ['badge-err','Flag'],
    pending: ['badge-neutral','Pending'],
    manual: ['badge-na','Manual'],
    na: ['badge-na','N/A']
  };
  const [cls, label] = map[status] || ['badge-neutral', status];
  return `<span class="badge ${cls}"><span class="dot"></span>${label}</span>`;
}

function renderEntity(e) {
  if (!e) return '';
  const checks = (e.checks || []).map(c => `
    <div class="check-card">
      <div class="check-left">
        <div class="check-name">${c.label}</div>
        ${c.note ? `<div class="check-note">${c.note}</div>` : ''}
      </div>
      ${badge(c.status)}
    </div>`).join('');
  const done = (e.checks||[]).filter(c=>c.status==='ok').length;
  const total = (e.checks||[]).filter(c=>!['na','manual'].includes(c.status)).length;
  const anyErr = (e.checks||[]).some(c=>c.status==='err');
  const anyWarn = (e.checks||[]).some(c=>c.status==='warn'||c.status==='pending');
  const overallBadge = done===total && total>0 ? badge('ok') : anyErr ? badge('err') : anyWarn ? badge('warn') : badge('pending');
  return `
    <div class="entity-section">
      <div class="entity-header">
        <div>
          <div class="entity-name">${e.name}</div>
          <div class="entity-sub">${e.system} · ${e.country}</div>
        </div>
        ${overallBadge}
      </div>
      <div class="checks">${checks}</div>
    </div>`;
}

let currentData = null;

async function toggleManual(key) {
  if (!currentData) return;
  if (!currentData.manual) currentData.manual = {};
  const was = currentData.manual[key] || false;
  currentData.manual[key] = !was;
  currentData.manualUpdatedAt = new Date().toISOString();
  renderManualSection(currentData.manual, currentData.manualChecklist || []);
  // persist
  try {
    await fetch('/api/update', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-dashboard-secret': SECRET },
      credentials: 'include',
      body: JSON.stringify(currentData)
    });
  } catch(e) { console.error('Save failed', e); }
}

function renderManualSection(manual, checklist) {
  const el = document.getElementById('manual-section');
  if (!el) return;
  const doneCount = checklist.filter(c => manual[c.key]).length;
  const items = checklist.map(c => {
    const done = !!manual[c.key];
    return `
      <div class="checklist-item ${done?'done':''}" onclick="toggleManual('${c.key}')">
        <div class="checklist-left">
          <div class="checklist-name ${done?'done-text':''}">${c.label}</div>
          ${c.sub ? `<div class="checklist-sub">${c.sub}</div>` : ''}
        </div>
        <button class="toggle-btn ${done?'mark-undone':'mark-done'}" onclick="event.stopPropagation();toggleManual('${c.key}')">
          ${done ? '✓ Done' : 'Mark done'}
        </button>
      </div>`;
  }).join('');
  el.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem">
      <span class="section-title" style="margin-bottom:0">Manual close steps</span>
      <span style="font-size:12px;color:var(--text-muted)">${doneCount}/${checklist.length} complete</span>
    </div>
    <div class="checklist-items">${items}</div>`;
}

function render(d) {
  currentData = d;
  const updated = norwayTime(d.updatedAt);
  document.getElementById('lastUpdated').textContent = `Accounting checks last updated: ${updated} · ${d.period || ''}`;

  const allAutoChecks = [...(d.no?.checks||[]), ...(d.se?.checks||[]), ...(d.us?.checks||[])];
  const autoDone = allAutoChecks.filter(c=>c.status==='ok').length;
  const autoTotal = allAutoChecks.filter(c=>!['na','manual'].includes(c.status)).length;
  const manualChecklist = d.manualChecklist || [];
  const manual = d.manual || {};
  const manualDone = manualChecklist.filter(c=>manual[c.key]).length;
  const totalDone = autoDone + manualDone;
  const totalItems = autoTotal + manualChecklist.length;

  document.getElementById('app').innerHTML = `
    <div class="summary-bar">
      <div class="sc"><div class="sc-label">Period</div><div class="sc-value" style="font-size:15px">${d.period||'—'}</div></div>
      <div class="sc"><div class="sc-label">Total progress</div><div class="sc-value" style="font-size:15px">${totalDone}/${totalItems}</div></div>
      <div class="sc"><div class="sc-label">Accounting</div><div class="sc-value" style="font-size:15px">${autoDone}/${autoTotal}</div></div>
      <div class="sc"><div class="sc-label">Manual steps</div><div class="sc-value" style="font-size:15px">${manualDone}/${manualChecklist.length}</div></div>
    </div>

    <span class="section-title">Accounting checks — auto updated by Claude</span>
    ${renderEntity(d.no)}
    <hr class="divider"/>
    ${renderEntity(d.se)}
    <hr class="divider"/>
    ${renderEntity(d.us)}
    <hr class="divider"/>
    <div id="manual-section"></div>`;

  renderManualSection(manual, manualChecklist);
}

load();
</script>
</body>
</html>
