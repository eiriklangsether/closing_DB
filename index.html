<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SalesScreen Finance Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f5f3;
      --surface: #ffffff;
      --border: rgba(0,0,0,0.08);
      --text-primary: #1a1a1a;
      --text-secondary: #6b6b6b;
      --text-muted: #9b9b9b;
      --green-bg: #eaf3de;
      --green-text: #3b6d11;
      --green-dot: #639922;
      --red-bg: #fcebeb;
      --red-text: #a32d2d;
      --red-dot: #e24b4a;
      --amber-bg: #faeeda;
      --amber-text: #854f0b;
      --amber-dot: #ef9f27;
      --blue: #185fa5;
      --radius: 12px;
      --radius-sm: 8px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 15px;
      font-weight: 500;
    }

    .logo-icon {
      width: 28px;
      height: 28px;
      background: var(--blue);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-icon svg { width: 16px; height: 16px; }

    .header-right { font-size: 12px; color: var(--text-muted); }

    main {
      max-width: 760px;
      margin: 0 auto;
      padding: 2.5rem 2rem;
    }

    .page-title { font-size: 22px; font-weight: 500; margin-bottom: 4px; }
    .page-sub { font-size: 14px; color: var(--text-secondary); margin-bottom: 2rem; }

    .refresh-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.25rem;
    }

    .section-label {
      font-size: 12px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
    }

    .refresh-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-family: inherit;
      color: var(--text-secondary);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 5px 12px;
      cursor: pointer;
    }
    .refresh-btn:hover { background: var(--bg); }
    .refresh-btn svg { width: 13px; height: 13px; }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 12px;
      margin-bottom: 2rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.5rem;
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .card-entity { font-size: 13px; color: var(--text-muted); margin-bottom: 3px; }
    .card-name { font-size: 15px; font-weight: 500; }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 500;
      padding: 4px 10px;
      border-radius: 99px;
      white-space: nowrap;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .badge-checking { background: var(--amber-bg); color: var(--amber-text); }
    .badge-checking .dot { background: var(--amber-dot); animation: pulse 1.2s ease-in-out infinite; }
    .badge-connected { background: var(--green-bg); color: var(--green-text); }
    .badge-connected .dot { background: var(--green-dot); }
    .badge-disconnected { background: var(--red-bg); color: var(--red-text); }
    .badge-disconnected .dot { background: var(--red-dot); }
    .badge-unconfigured { background: var(--bg); color: var(--text-muted); }
    .badge-unconfigured .dot { background: var(--text-muted); }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .card-detail { font-size: 12px; color: var(--text-secondary); }

    .detail-row {
      display: flex;
      justify-content: space-between;
      padding: 5px 0;
      border-top: 1px solid var(--border);
    }

    .detail-label { color: var(--text-muted); }
    .detail-value { font-weight: 500; color: var(--text-primary); }
    .detail-value.ok { color: var(--green-text); }
    .detail-value.err { color: var(--red-text); }

    .last-checked { font-size: 11px; color: var(--text-muted); text-align: right; }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="2" y="8" width="3" height="6" rx="1" fill="white"/>
        <rect x="6.5" y="5" width="3" height="9" rx="1" fill="white"/>
        <rect x="11" y="2" width="3" height="12" rx="1" fill="white"/>
      </svg>
    </div>
    SalesScreen Finance
  </div>
  <div class="header-right">Internal · Finance team</div>
</header>

<main>
  <div class="page-title">System connectivity</div>
  <div class="page-sub">Live connection status across accounting systems</div>

  <div class="refresh-row">
    <span class="section-label">Accounting systems</span>
    <button class="refresh-btn" onclick="checkAll()">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" xmlns="http://www.w3.org/2000/svg">
        <path d="M13.5 8A5.5 5.5 0 1 1 8 2.5c1.8 0 3.4.87 4.4 2.2" stroke-linecap="round"/>
        <polyline points="12,2 12.5,5 9.5,4.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Refresh
    </button>
  </div>

  <div class="cards">

    <div class="card">
      <div class="card-top">
        <div>
          <div class="card-entity">Dogu SalesScreen AS · Norway</div>
          <div class="card-name">Tripletex</div>
        </div>
        <div class="status-badge badge-checking" id="badge-tripletex">
          <div class="dot"></div><span>Checking</span>
        </div>
      </div>
      <div class="card-detail">
        <div class="detail-row"><span class="detail-label">Response</span><span class="detail-value" id="tt-response">—</span></div>
        <div class="detail-row"><span class="detail-label">Latency</span><span class="detail-value" id="tt-latency">—</span></div>
        <div class="detail-row"><span class="detail-label">HTTP status</span><span class="detail-value" id="tt-http">—</span></div>
      </div>
    </div>

    <div class="card">
      <div class="card-top">
        <div>
          <div class="card-entity">SalesScreen Inc. · United States</div>
          <div class="card-name">QuickBooks</div>
        </div>
        <div class="status-badge badge-checking" id="badge-quickbooks">
          <div class="dot"></div><span>Checking</span>
        </div>
      </div>
      <div class="card-detail">
        <div class="detail-row"><span class="detail-label">Response</span><span class="detail-value" id="qb-response">—</span></div>
        <div class="detail-row"><span class="detail-label">Latency</span><span class="detail-value" id="qb-latency">—</span></div>
        <div class="detail-row"><span class="detail-label">HTTP status</span><span class="detail-value" id="qb-http">—</span></div>
      </div>
    </div>

  </div>

  <div class="last-checked" id="last-checked"></div>
</main>

<script>
  const SECRET = 'salesscreenclosing';

  async function ping(endpoint) {
    const t0 = Date.now();
    try {
      const res = await fetch(`/api/${endpoint}`, {
        headers: { 'x-dashboard-secret': SECRET }
      });
      const latency = Date.now() - t0;
      const data = await res.json();
      return { ok: data.ok, latency, http: data.status, error: data.error };
    } catch (e) {
      return { ok: false, latency: null, http: null, error: e.message };
    }
  }

  function setCard(key, result) {
    const badge = document.getElementById(`badge-${key}`);
    const pfx = key === 'tripletex' ? 'tt' : 'qb';
    const rEl = document.getElementById(`${pfx}-response`);
    const lEl = document.getElementById(`${pfx}-latency`);
    const hEl = document.getElementById(`${pfx}-http`);

    if (!result.ok) {
      badge.className = 'status-badge badge-disconnected';
      badge.innerHTML = '<div class="dot"></div><span>Disconnected</span>';
      rEl.textContent = result.error || 'Auth error';
      rEl.className = 'detail-value err';
    } else {
      badge.className = 'status-badge badge-connected';
      badge.innerHTML = '<div class="dot"></div><span>Connected</span>';
      rEl.textContent = 'OK';
      rEl.className = 'detail-value ok';
    }
    lEl.textContent = result.latency != null ? `${result.latency} ms` : '—';
    hEl.textContent = result.http || '—';
    hEl.className = result.ok ? 'detail-value ok' : 'detail-value err';
  }

  function setChecking(key) {
    const badge = document.getElementById(`badge-${key}`);
    badge.className = 'status-badge badge-checking';
    badge.innerHTML = '<div class="dot"></div><span>Checking</span>';
    const pfx = key === 'tripletex' ? 'tt' : 'qb';
    ['response','latency','http'].forEach(f => {
      const el = document.getElementById(`${pfx}-${f}`);
      if (el) { el.textContent = '—'; el.className = 'detail-value'; }
    });
  }

  async function checkAll() {
    ['tripletex','quickbooks'].forEach(setChecking);
    document.getElementById('last-checked').textContent = 'Checking…';
    const [tt, qb] = await Promise.all([ping('tripletex'), ping('quickbooks')]);
    setCard('tripletex', tt);
    setCard('quickbooks', qb);
    const now = new Date();
    document.getElementById('last-checked').textContent =
      `Last checked: ${now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', second: '2-digit' })}`;
  }

  checkAll();
</script>
</body>
</html>
